name: Quality Gates Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Stage 1: Static Analysis ──────────────────────────────────────────────
  static-analysis:
    name: "Gate 1 · Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check --no-transfer-progress

      - name: SpotBugs
        run: mvn spotbugs:check --no-transfer-progress

      - name: Upload SpotBugs report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml

  # ─── Stage 2: Unit Tests + Coverage ────────────────────────────────────────
  unit-tests:
    name: "Gate 2 · Unit Tests (≥80% coverage)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests with coverage
        run: mvn test jacoco:report jacoco:check --no-transfer-progress -Dtest="**/unit/**"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Coverage summary
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

  # ─── Stage 3: Integration Tests ────────────────────────────────────────────
  integration-tests:
    name: "Gate 3 · Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: booksdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn test --no-transfer-progress -Dtest="**/integration/**"
        env:
          DB_URL: jdbc:postgresql://localhost:5432/booksdb
          DB_USER: postgres
          DB_PASSWORD: postgres

  # ─── Stage 4: Security Scan ────────────────────────────────────────────────
  security-scan:
    name: "Gate 4 · Security (No Critical CVEs)"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: mvn dependency-check:check --no-transfer-progress
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # ─── Stage 5: Performance Tests ────────────────────────────────────────────
  performance-tests:
    name: "Gate 5 · Performance (p95<500ms, errors<1%)"
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: booksdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn package -DskipTests --no-transfer-progress

      - name: Start application
        run: |
          java -jar target/*.jar &
          echo "APP_PID=$!" >> $GITHUB_ENV
          sleep 15
        env:
          DB_URL: jdbc:postgresql://localhost:5432/booksdb
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run k6 performance test
        run: k6 run tests/performance/load-test.js --out json=results.json
        env:
          BASE_URL: http://localhost:8080

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json

  # ─── Summary ───────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "Quality Gate Summary"
    runs-on: ubuntu-latest
    needs: [static-analysis, unit-tests, integration-tests, security-scan, performance-tests]
    if: always()
    steps:
      - name: All gates passed
        if: ${{ needs.static-analysis.result == 'success' && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.security-scan.result == 'success' && needs.performance-tests.result == 'success' }}
        run: echo "All quality gates passed. Ready to merge."

      - name: Gates failed
        if: ${{ needs.static-analysis.result != 'success' || needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success' || needs.security-scan.result != 'success' || needs.performance-tests.result != 'success' }}
        run: |
          echo "One or more quality gates failed:"
          echo "  Static Analysis : ${{ needs.static-analysis.result }}"
          echo "  Unit Tests      : ${{ needs.unit-tests.result }}"
          echo "  Integration     : ${{ needs.integration-tests.result }}"
          echo "  Security        : ${{ needs.security-scan.result }}"
          echo "  Performance     : ${{ needs.performance-tests.result }}"
          exit 1
